<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Tidak Ditemukan</title>

    <!-- SEO -->
    <meta name="robots" content="noindex, follow">
    <meta name="description" content="Halaman yang Anda cari tidak ditemukan. Kembali ke halaman utama untuk menemukan informasi terbaru.">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 500px;
            padding: 20px;
        }

        h1 {
            font-size: 100px;
            color: #38bdf8;
        }

        h2 {
            margin: 10px 0;
            font-size: 24px;
        }

        p {
            color: #cbd5f5;
            margin-bottom: 20px;
        }

        a {
            display: inline-block;
            padding: 12px 25px;
            background: #38bdf8;
            color: #000;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s;
        }

        a:hover {
            background: #0ea5e9;
        }

        .emoji {
            font-size: 60px;
            margin-bottom: 10px;
        }

        @media(max-width: 500px) {
            h1 {
                font-size: 70px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="emoji">🚫</div>
    <h1>404</h1>
    <h2>Halaman Tidak Ditemukan</h2>
    <p>Maaf, halaman yang kamu cari tidak tersedia atau sudah dipindahkan.</p>
    <a href="/">Kembali ke Beranda</a>
</div>

</body>
</html>
